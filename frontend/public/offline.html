<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f7aff" />
    <title>Gel Invent - Offline</title>
    <style>
      body {
        margin: 0;
        font-family: "Arial", sans-serif;
        background: #f7f9ff;
        color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        background: #ffffff;
        border: 1px solid #dbe5f2;
        border-radius: 18px;
        padding: 32px;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
        text-align: center;
      }
      .badge {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        border-radius: 16px;
        background: linear-gradient(135deg, #1f7aff, #0b1021);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: 0.5px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.6;
      }
      button {
        margin-top: 20px;
        padding: 10px 18px;
        border-radius: 10px;
        border: none;
        background: #1f7aff;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">GI</div>
      <h1>You are offline</h1>
      <p>Gel Invent is available offline for recently visited pages. Reconnect to sync data and load new content.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
